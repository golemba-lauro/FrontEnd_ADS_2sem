<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Bichinho Virtual</title>
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
    
    <style>
        /* Animação das Estrelas */
        @keyframes piscar {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .estrela {
            animation: piscar 3s infinite ease-in-out;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col relative overflow-hidden">
 
  <div class="fixed inset-0 z-[-3]" 
       style="background-image: url('planeta.png'); background-size: cover; background-position: center;">
  </div>

  <div id="camada-noite" 
       class="fixed inset-0 opacity-0 transition-opacity duration-1000 z-[-2]" 
       style="background-image: url('planeta_noite.png'); background-size: cover; background-position: center;">
  </div>

  <div id="camada-estrelas" class="fixed inset-0 opacity-0 transition-opacity duration-1000 z-[-1]"></div>


  <div class="w-full flex items-center justify-between p-6 gap-4 bg-white/20 backdrop-blur-md shadow-sm z-10">
    <div class="flex items-center gap-4">
        <div class="avatar">
          <div class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2 bg-white">
            <img id="avatar-img" src="musketeer.png" alt="Avatar" />
          </div>
        </div>
        <input type="text" placeholder="Nome da criatura..." class="input input-secondary w-full max-w-xs bg-white/90" />
    </div>

    <div class="flex items-center gap-2 bg-white/50 p-2 rounded-2xl backdrop-blur-lg">
        <span class="text-sm font-bold text-amber-600">☀️</span>
        <input type="checkbox" class="toggle toggle-info" onchange="alternarDiaNoite(this)" />
        <span class="text-sm font-bold text-indigo-900">🌙</span>
    </div>
  </div>


  <div class="flex-grow flex flex-col justify-center items-center w-full px-4 z-10">
    <img id="b" src="musketeer.png" class="w-full max-w-md h-auto drop-shadow-2xl transition-all duration-300 hover:scale-105" />
    
    <div class="mt-8">
      <img id="leitao" src="leitao.png" class="w-24 h-auto cursor-pointer active:scale-90 transition-transform drop-shadow-lg" onclick="alimentar()" />
    </div>
  </div>

  <button onclick="mostrarFerlini()" class="fixed bottom-3 right-3 w-8 h-8 bg-white/10 hover:bg-white/30 border border-white/20 rounded-full z-50 cursor-pointer backdrop-blur-sm transition-colors flex justify-center items-center group">
      <span class="text-white/40 text-xs group-hover:text-white transition-colors">?</span>
  </button>

  <img id="foto-ferlini" src="ferlini.png" class="fixed bottom-14 right-4 w-64 h-auto z-40 scale-0 opacity-0 transition-all duration-500 origin-bottom-right drop-shadow-2xl rounded-xl border-4 border-white/50 shadow-2xl" alt="O Grande Ferlini" />

  
  
  <script src="script.js"></script>

</body>
</html>
